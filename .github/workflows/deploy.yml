name: פרסום המשחק

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: הורדת קוד
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: הגדרת Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: העלאת קבצים
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: פרסום
        id: deploy
        uses: actions/deploy-pages@v4
