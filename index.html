<!DOCTYPE html>
<html lang="he">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flappy Eliav</title>
</head>
<body>

  <!-- MENU -->
  <div id="menu-screen">
    <h1>Flappy Eliav</h1>
    <div id="highscores-menu"></div>
    <p class="subtitle">בחר מצב משחק</p>
    <div id="mode-buttons">
      <button class="mode-btn classic-btn" onclick="startGame('classic')">
        <div class="mode-icon">☀️</div>
        <div class="mode-name">קלאסי</div>
        <div class="mode-desc">קצב רגיל</div>
      </button>
      <button class="mode-btn hard-btn" onclick="startGame('hard')">
        <div class="mode-icon">🔥</div>
        <div class="mode-name">קשה</div>
        <div class="mode-desc">מהיר ומאתגר</div>
      </button>
      <button class="mode-btn night-btn" onclick="startGame('night')">
        <div class="mode-icon">🌙</div>
        <div class="mode-name">לילה</div>
        <div class="mode-desc">מצב לילה</div>
      </button>
      <button class="mode-btn mario-btn" onclick="startGame('mario')">
        <div class="mode-icon">🏃</div>
        <div class="mode-name">ריצה</div>
        <div class="mode-desc">10 שלבים · 3 חיים · קומבו</div>
      </button>
      <button class="mode-btn arcade-btn" onclick="startGame('arcade')">
        <div class="mode-icon">🕹️</div>
        <div class="mode-name">ארקייד</div>
        <div class="mode-desc">5 שלבים · פלטפורמר · ג'ויסטיק</div>
      </button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <div id="scores">
      <div id="live-score">ניקוד: 0</div>
      <div id="high-score"></div>
      <div id="lives-display" class="hidden">❤️❤️❤️</div>
      <div id="coin-score" class="hidden">🪙 0</div>
    </div>
    <div id="powerup-status" class="hidden"></div>
    <div id="combo-display" class="hidden"></div>

    <!-- Flappy elements -->
    <div id="pipe-top"></div>
    <div id="pipe-bottom"></div>

    <!-- Mario elements -->
    <div id="ground"></div>
    <div id="obstacle"></div>
    <div id="obstacle2"></div>
    <div id="air-obs" class="hidden"></div>
    <div id="coin-wrap" class="hidden"><div id="coin">🪙</div></div>
    <div id="powerup-wrap" class="hidden"><div id="powerup"></div></div>
    <div id="level-banner"></div>
    <div id="jump-dots"><span id="jd1"></span><span id="jd2"></span></div>

    <!-- Shared -->
    <div id="character"></div>
    <div id="tap-hint">הקש לקפוץ ✋</div>
    <button id="crouch-btn" class="hidden">⬇</button>
  </div>

  <!-- ARCADE SCREEN -->
  <div id="arcade-screen" class="hidden">
    <div id="arcade-wrapper">
      <canvas id="arcade-canvas"></canvas>
      <!-- Joystick (left side) -->
      <div id="joystick-wrap">
        <div id="joy-outer">
          <div id="joy-inner"></div>
        </div>
      </div>
      <!-- Action buttons (right side) — icons only, side by side -->
      <div id="arcade-actions">
        <button class="arc-btn" id="btn-b">⬇</button>
        <button class="arc-btn" id="btn-a">⬆</button>
      </div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="gameover-screen" class="hidden">
    <h1>משחק נגמר!</h1>
    <div id="final-score-display"></div>
    <div id="gameover-buttons">
      <button class="go-btn menu-btn" onclick="showMenu()">תפריט</button>
      <button class="go-btn play-again-btn" onclick="restartGame()">שחק שוב</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
